[package]
name = "mako"
version = "0.2.4"
edition = "2021"
description = "Mako — systems/backend language compiler (Python-clear, Go-fast, type-safe)"
license = "MIT"

[[bin]]
name = "mako"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
regex = "1"
sha2 = "0.10"
thiserror = "2"
