name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install clang + OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang libssl-dev

      - name: Install LLVM/clang (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y
        continue-on-error: true

      - name: Ensure clang on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $clang = Get-Command clang -ErrorAction SilentlyContinue
          if (-not $clang) {
            $candidates = @(
              "C:\Program Files\LLVM\bin",
              "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\x64\bin",
              "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Tools\Llvm\x64\bin"
            )
            foreach ($c in $candidates) {
              if (Test-Path "$c\clang.exe") {
                echo "$c" >> $env:GITHUB_PATH
                break
              }
            }
          }
          clang --version

      - name: Build
        run: cargo build --release

      - name: Version
        shell: bash
        run: ./target/release/mako --version

      - name: Help
        shell: bash
        run: ./target/release/mako --help

      - name: JSON test report
        shell: bash
        run: |
          set -o pipefail
          ./target/release/mako test examples/testing/add_test.mko --json --coverage |
            python -c 'import json,sys; r=json.load(sys.stdin); assert r["schemaVersion"] == 1 and r["ok"] and r["summary"]["passed"] == 1 and r["summary"]["tests"] == 3 and r["runs"][0]["coverage"]["testFunctions"] == 3 and r["runs"][0]["files"][0]["stdout"].splitlines()[-1] == "PASS"'
          set +e
          failure_json="$(./target/release/mako test examples/ci/json_report_failure_test.mko --json)"
          failure_status=$?
          set -e
          test "$failure_status" -ne 0
          printf '%s' "$failure_json" |
            python -c 'import json,sys; r=json.load(sys.stdin); f=r["runs"][0]["files"][0]; assert not r["ok"] and f["status"] == "failed" and f["failure"]["kind"] == "exit"'

      - name: JSON check report
        shell: bash
        run: |
          legacy_json="$(./target/release/mako check --json examples/testing/add_test.mko)"
          printf '%s' "$legacy_json" |
            python -c 'import json,sys; r=json.load(sys.stdin); assert isinstance(r, list) and r[0]["ok"] and "schemaVersion" not in r[0]'
          versioned_json="$(./target/release/mako check --json=v1 examples/testing/add_test.mko)"
          printf '%s' "$versioned_json" |
            python -c 'import json,sys; r=json.load(sys.stdin); assert r["schemaVersion"] == 1 and r["command"] == "check" and r["ok"] and r["summary"]["passed"] == 1'
          set +e
          failure_json="$(./target/release/mako check --json=v1 examples/bad/labeled_break_unknown.mko)"
          failure_status=$?
          set -e
          test "$failure_status" -ne 0
          printf '%s' "$failure_json" |
            python -c 'import json,sys; r=json.load(sys.stdin); assert not r["ok"] and r["summary"]["failed"] == 1 and r["targets"][0]["diagnostics"]'
          set +e
          resolution_json="$(./target/release/mako check --json=v1 examples/ci/missing-check-input.mko 2>/dev/null)"
          resolution_status=$?
          set -e
          test "$resolution_status" -ne 0
          printf '%s' "$resolution_json" |
            python -c 'import json,sys; r=json.load(sys.stdin); assert not r["ok"] and not r["targets"] and r["errors"]'

      - name: Validate compiler benchmark matrix
        if: runner.os == 'Linux'
        run: >-
          python scripts/bench-compile.py
          --root "${{ runner.temp }}/mako-compile-bench"
          --generate-only

      - name: Compile benchmark build smoke
        if: runner.os == 'Linux'
        run: >-
          python scripts/bench-compile.py
          --root "${{ runner.temp }}/mako-compile-bench"
          --sizes 10000
          --shapes single generic
          --repeat 1
          --build
          --output "${{ runner.temp }}/mako-compile-build-bench.json"

      - name: Compile benchmark fixture smoke
        run: >-
          python scripts/bench-compile.py
          --root "${{ runner.temp }}/mako-compile-bench"
          --sizes 1000
          --repeat 1
          --output "${{ runner.temp }}/mako-compile-bench.json"

      - name: Upload compiler benchmark sample
        uses: actions/upload-artifact@v4
        with:
          name: mako-compile-bench-${{ matrix.os }}
          path: ${{ runner.temp }}/mako-compile-*.json

      - name: Recursive debug compiler (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cargo run --quiet -- test examples/testing/deep_expr_stack_test.mko
        continue-on-error: true

      - name: Default test suite (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: cargo run --quiet --release -- test examples/testing
        env:
          MAKO_TEST_TIMEOUT_SECS: "90"
          MAKO_LIVE_TLS: ""
          MAKO_LIVE_NGHTTP2: ""
          MAKO_LIVE_QUIC: ""

      # 0.4.5 gate: Cranelift native backend requires --features llvm-backend for
      # the bundled linker. Skip when the feature is not built (default CI builds).
      # Some tests (proxy, SQL) SIGPIPE/SIGABRT without their backend services.
      - name: Native backend test suite (Linux/macOS)
        if: runner.os != 'Windows'
        continue-on-error: true
        shell: bash
        run: |
          if cargo run --quiet --release -- build examples/testing/add_test.mko --backend native -o /dev/null 2>/dev/null; then
            cargo run --quiet --release -- test examples/testing --backend native
          else
            echo "::notice::Native backend linking not available (requires --features llvm-backend); skipping native test suite"
          fi
        env:
          MAKO_TEST_TIMEOUT_SECS: "120"
          MAKO_LIVE_TLS: ""
          MAKO_LIVE_NGHTTP2: ""
          MAKO_LIVE_QUIC: ""
          MAKO_RUNTIME: ${{ github.workspace }}/runtime

      - name: Default test suite (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cargo run --quiet --release -- test examples/testing
        continue-on-error: true
        env:
          MAKO_TEST_TIMEOUT_SECS: "90"
          MAKO_LIVE_TLS: ""
          MAKO_LIVE_NGHTTP2: ""
          MAKO_LIVE_QUIC: ""

      - name: Core language tests (Windows — must pass)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cargo run --quiet --release -- test examples/testing/match_guard_test.mko
          cargo run --quiet --release -- test examples/testing/match_or_test.mko
          cargo run --quiet --release -- test examples/testing/generic_bounds_test.mko
          cargo run --quiet --release -- test examples/testing/collections_list_test.mko
          cargo run --quiet --release -- test examples/testing/slice_test.mko
          cargo run --quiet --release -- test examples/testing/enum_method_test.mko
          cargo run --quiet --release -- test examples/testing/generic_enum_test.mko
          cargo run --quiet --release -- test examples/testing/fstring_fmt_test.mko
          cargo run --quiet --release -- test examples/testing/asan_stress_test.mko
          cargo run --quiet --release -- test examples/testing/own_branch_regress_test.mko
          cargo run --quiet --release -- test examples/testing/double_free_guard_test.mko
          cargo run --quiet --release -- test examples/testing/match_own_free_test.mko
          cargo run --quiet --release -- test examples/testing/early_return_path_free_test.mko
          cargo run --quiet --release -- test examples/testing/add_test.mko
          cargo run --quiet --release -- test examples/testing/context_mako_test.mko
          cargo run --quiet --release -- test examples/testing/json_mako_test.mko
          cargo run --quiet --release -- test examples/testing/collections_mako_test.mko
          cargo run --quiet --release -- test examples/testing/crew_fan_test.mko
          cargo run --quiet --release -- test examples/testing/kick_fn_test.mko
          cargo run --quiet --release -- test examples/testing/job_join_typed_test.mko
          cargo run --quiet --release -- test examples/testing/actor_test.mko
          cargo run --quiet --release -- test examples/testing/wave8_queue_test.mko
          cargo run --quiet --release -- test examples/testing/wave10_queue_test.mko
          cargo run --quiet --release -- test examples/testing/bufio_test.mko
          cargo run --quiet --release -- test examples/testing/db_engine_test.mko
          cargo run --quiet --release -- test examples/testing/file_env_test.mko
          cargo run --quiet --release -- test examples/testing/fs_polish_test.mko
          cargo run --quiet --release -- test examples/testing/plugin_product_test.mko
        env:
          MAKO_TEST_TIMEOUT_SECS: "90"

      - name: Windows storage I/O
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo run --quiet --release -- test examples/testing/storage_portable_io_test.mko
          cargo run --quiet --release -- test examples/ci/windows_direct_io_test.mko
        env:
          MAKO_TEST_TIMEOUT_SECS: "90"

      - name: Init smoke
        shell: bash
        run: |
          ./target/release/mako init "${RUNNER_TEMP}/mako-ci-demo" --name ci-demo
          ./target/release/mako run "${RUNNER_TEMP}/mako-ci-demo/main.mko"

      # 0.4.9 49-B: doctor + init/run install smoke on every primary host.
      - name: Install / doctor smoke
        shell: bash
        run: ./scripts/install-smoke.sh
        env:
          MAKO_BIN: ${{ github.workspace }}/target/release/mako

      # 0.4.10 LR-1: years-up steady-state (Unix; Windows soak later).
      - name: Long-run soak (RSS + ownership)
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/long-run-soak.sh
        env:
          MAKO_BIN: ${{ github.workspace }}/target/release/mako
          MAKO_LONG_RUN_BACKEND: c

      # 0.4.11 LR-6: HTTP accept loop under concurrent clients.
      - name: HTTP long-run soak
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/http-long-run-soak.sh
        env:
          MAKO_BIN: ${{ github.workspace }}/target/release/mako
          MAKO_HTTP_SOAK_BACKEND: c
          MAKO_HTTP_SOAK_REQUESTS: "1200"
          MAKO_HTTP_SOAK_CLIENTS: "8"
          MAKO_HTTP_SOAK_PORT: "19810"

      - name: Intel macOS cross-artifact smoke
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ./target/release/mako build examples/hello.mko \
            --target x86_64-apple-darwin -o "${RUNNER_TEMP}/hello-macos-x86_64"
          ./scripts/verify-target-artifact.sh \
            x86_64-apple-darwin "${RUNNER_TEMP}/hello-macos-x86_64"

  # 0.4.9 49-A: optimizing LLVM backend (macOS + bundled lldMachO only).
  # Linux/Windows skip is documented in scripts/llvm-backend-test.sh and BUILD.md.
  llvm-backend:
    name: LLVM backend (macOS)
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 21 + cmake
        run: |
          brew install llvm@21 cmake
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> "$GITHUB_ENV"
          echo "$(brew --prefix llvm@21)/bin" >> "$GITHUB_PATH"

      - name: Cache static lld toolchain
        uses: actions/cache@v4
        id: lld-cache
        with:
          path: out/native-toolchain
          key: native-toolchain-llvmorg-21.1.8-${{ runner.os }}-${{ runner.arch }}-v1

      - name: Bootstrap static lld (cache miss)
        if: steps.lld-cache.outputs.cache-hit != 'true'
        run: ./scripts/bootstrap-native-toolchain.sh
        env:
          MAKO_LLVM_PREFIX: ${{ env.LLVM_SYS_211_PREFIX }}

      - name: Export lld env
        run: |
          echo "MAKO_LLD_STATIC_DIR=${{ github.workspace }}/out/native-toolchain/lld-build/lib" >> "$GITHUB_ENV"
          echo "MAKO_LLD_INCLUDE_DIR=${{ github.workspace }}/out/native-toolchain/llvm-project-llvmorg-21.1.8/lld/include" >> "$GITHUB_ENV"
          test -f out/native-toolchain/lld-build/lib/liblldMachO.a
          test -f out/native-toolchain/llvm-project-llvmorg-21.1.8/lld/include/lld/Common/Driver.h

      - name: LLVM backend correctness gate
        run: ./scripts/llvm-backend-test.sh
        env:
          MAKO_RUNTIME: ${{ github.workspace }}/runtime
          # Fail hard on macOS when toolchain is present (do not soft-skip).
          MAKO_LLVM_SKIP_IF_UNAVAILABLE: "0"

  native-memory-safety:
    name: Native backend memory safety (macOS)
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Native differential + GuardMalloc + leaks gate
        run: ./scripts/native-compiler-test.sh
        env:
          MAKO_RUNTIME: ${{ github.workspace }}/runtime

  cross-smoke:
    name: Cross-compile artifacts (Windows + Linux musl + WASI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install clang + zig
        run: |
          sudo apt-get update
          sudo apt-get install -y clang xz-utils
          curl -sL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | sudo tar -xJ -C /opt
          echo "/opt/zig-linux-x86_64-0.13.0" >> "$GITHUB_PATH"

      - name: Build mako
        run: cargo build --release

      - name: Cross-compile hello to Windows
        run: |
          ./target/release/mako init /tmp/mako-cross --name cross-hello
          ./target/release/mako build /tmp/mako-cross/main.mko \
            --target x86_64-pc-windows-gnu \
            -o /tmp/mako-cross/hello.exe
          ./scripts/verify-target-artifact.sh \
            x86_64-pc-windows-gnu /tmp/mako-cross/hello.exe

      - name: Cross-compile static Linux musl hello
        run: |
          ./target/release/mako init /tmp/mako-musl --name musl-hello
          ./target/release/mako build /tmp/mako-musl/main.mko \
            --target x86_64-unknown-linux-musl \
            -o /tmp/mako-musl/hello-static
          ./scripts/verify-target-artifact.sh \
            x86_64-unknown-linux-musl /tmp/mako-musl/hello-static --static

      - name: Cross-compile static Linux musl ARM64 hello
        run: |
          ./target/release/mako init /tmp/mako-musl-arm64 --name musl-arm64-hello
          ./target/release/mako build /tmp/mako-musl-arm64/main.mko \
            --target aarch64-unknown-linux-musl \
            -o /tmp/mako-musl-arm64/hello-static
          ./scripts/verify-target-artifact.sh \
            aarch64-unknown-linux-musl /tmp/mako-musl-arm64/hello-static --static

      - name: Cross-compile WASI hello
        run: |
          ./target/release/mako init /tmp/mako-wasi --name wasi-hello
          ./target/release/mako build /tmp/mako-wasi/main.mko \
            --target wasm32-wasip1 -o /tmp/mako-wasi/hello.wasm
          ./scripts/verify-target-artifact.sh \
            wasm32-wasip1 /tmp/mako-wasi/hello.wasm

      - name: Upload cross artifact
        uses: actions/upload-artifact@v4
        with:
          name: mako-cross-x86_64-pc-windows-gnu-hello
          path: |
            /tmp/mako-cross/hello.exe
            /tmp/mako-musl/hello-static
            /tmp/mako-musl-arm64/hello-static
            /tmp/mako-wasi/hello.wasm

  bench-gate:
    name: Bench gate vs Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Build mako
        run: cargo build --release
      - name: Run bench-gate (≤2.0× Rust)
        run: ./scripts/bench-gate.sh

  bench-gate-strict:
    name: Bench gate strict 1.5×
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Build mako
        run: cargo build --release
      - name: Run bench-gate 1.5×
        run: ./scripts/bench-gate.sh 1.5

  claims-gate:
    name: Product claims gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libssl-dev libsqlite3-dev ripgrep
      - name: Build mako
        run: cargo build --release
      - name: Verify claims and regression fixtures
        env:
          MAKO_CACHE: ${{ runner.temp }}/mako-claims-cache
        run: ./scripts/claims-gate.sh

  tsan:
    name: TSan concurrency smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Build mako
        run: cargo build --release
      - name: Race-test concurrent suite
        run: |
          ./target/release/mako test --race examples/testing/crew_fan_test.mko
          ./target/release/mako test --race examples/testing/kick_send_test.mko
          ./target/release/mako test --race examples/testing/kick_share_test.mko
          ./target/release/mako test --race examples/testing/kick_sync_test.mko
          ./target/release/mako test --race examples/testing/chan_struct_test.mko
          ./target/release/mako test --race examples/testing/chan_float_test.mko
          ./target/release/mako test --race examples/testing/crew_drain_test.mko
          ./target/release/mako test --race examples/testing/job_join_typed_test.mko
          ./target/release/mako test --race examples/testing/proxy_pool_test.mko
          ./target/release/mako test --race examples/testing/proxy_edge_test.mko
          ./target/release/mako test --race examples/testing/wave11_queue_test.mko
          ./target/release/mako test --race examples/testing/fan_string_test.mko
          ./target/release/mako test --race examples/testing/kick_string_test.mko
          ./target/release/mako test --race examples/testing/wave14_queue_test.mko
          ./target/release/mako test --race examples/testing/wave15_queue_test.mko
          ./target/release/mako test --race examples/testing/wave16_queue_test.mko
          ./target/release/mako test --race examples/testing/wave17_queue_test.mko
          ./target/release/mako test --race examples/testing/wave18_queue_test.mko
          ./target/release/mako test --race examples/testing/wave19_queue_test.mko
          ./target/release/mako test --race examples/testing/wave20_queue_test.mko
          ./target/release/mako test --race examples/testing/wave21_queue_test.mko
          ./target/release/mako test --race examples/testing/wave22_queue_test.mko
          ./target/release/mako test --race examples/testing/wave23_queue_test.mko
          ./target/release/mako test --race examples/testing/wave24_queue_test.mko
          ./target/release/mako test --race examples/testing/wave25_queue_test.mko
          ./target/release/mako test --race examples/testing/wave26_queue_test.mko
          ./target/release/mako test --race examples/testing/wave27_queue_test.mko
          ./target/release/mako test --race examples/testing/wave28_queue_test.mko
          ./target/release/mako test --race examples/testing/wave29_queue_test.mko
          ./target/release/mako test --race examples/testing/wave30_queue_test.mko
          ./target/release/mako test --race examples/testing/wave31_queue_test.mko
          ./target/release/mako test --race examples/testing/wave32_queue_test.mko
          ./target/release/mako test --race examples/testing/wave33_queue_test.mko
          ./target/release/mako test --race examples/testing/wave34_queue_test.mko
          ./target/release/mako test --race examples/testing/wave35_queue_test.mko
          ./target/release/mako test --race examples/testing/wave36_queue_test.mko
          ./target/release/mako test --race examples/testing/wave37_queue_test.mko
          ./target/release/mako test --race examples/testing/wave38_queue_test.mko
          ./target/release/mako test --race examples/testing/share_atomic_test.mko
          ./target/release/mako test --race examples/testing/kick_sync_test.mko
          ./target/release/mako test --race examples/testing/cmap_stress_test.mko
          ./target/release/mako test --race examples/testing/kick_share_test.mko
          ./target/release/mako test --race examples/testing/job_join_typed_test.mko
          ./target/release/mako test --race examples/testing/select_nll_test.mko
          ./target/release/mako test --race examples/testing/chan_string_test.mko
          ./target/release/mako test --race examples/testing/chan_struct_test.mko
          ./target/release/mako test --race examples/testing/chan_float_test.mko
          ./target/release/mako test --race examples/testing/crew_fan_test.mko
          ./target/release/mako test --race examples/testing/crew_drain_test.mko
          MAKO_RT_STRESS_SEED=7 MAKO_RT_STRESS_ROUNDS=8 ./target/release/mako test --race examples/testing/chan_select_stress_test.mko
          MAKO_RT_STRESS_SEED=104729 MAKO_RT_STRESS_ROUNDS=8 ./target/release/mako test --race examples/testing/chan_select_stress_test.mko

  asan:
    name: ASan invalid memory access
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Build mako
        run: cargo build --release
      - name: Run full suite under AddressSanitizer
        env:
          # Test programs do not yet reclaim every owned allocation at exit.
          # Keep this job focused on use-after-free and out-of-bounds access.
          ASAN_OPTIONS: detect_leaks=0
          MAKO_TEST_TIMEOUT_SECS: "120"
        run: |
          ./target/release/mako test --sanitize address examples/testing
      - name: Check discarded bag cleanup
        env:
          ASAN_OPTIONS: detect_leaks=1
          MAKO_TEST_TIMEOUT_SECS: "120"
        run: |
          ./target/release/mako test --sanitize address examples/testing/discarded_bag_drop_test.mko
      - name: Check borrowed bag discard
        env:
          ASAN_OPTIONS: detect_leaks=0
          MAKO_TEST_TIMEOUT_SECS: "120"
        run: |
          ./target/release/mako test --sanitize address examples/testing/discarded_bag_borrow_test.mko
      - name: Check map key ownership
        env:
          ASAN_OPTIONS: detect_leaks=0
          MAKO_TEST_TIMEOUT_SECS: "120"
        run: |
          ./target/release/mako test --sanitize address examples/testing/map_set_take_alias_test.mko

  ubsan:
    name: UBSan undefined behavior
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Build mako
        run: cargo build --release
      - name: Run full suite under UndefinedBehaviorSanitizer
        env:
          MAKO_TEST_TIMEOUT_SECS: "120"
        run: |
          ./target/release/mako test --sanitize undefined examples/testing

  gcc:
    name: GCC compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + GCC
        uses: dtolnay/rust-toolchain@stable
      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Build mako
        run: cargo build --release
      - name: Run full suite compiled with GCC
        env:
          MAKO_CC: gcc
          MAKO_TEST_TIMEOUT_SECS: "90"
        run: |
