name: Release

# Build the full cargo release binary on each OS and publish install packages.
# End users download the binary — they never install Rust/cargo.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "v0.2.1"

permissions:
  contents: write

jobs:
  build-and-publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mako-x86_64-unknown-linux-gnu
          - os: macos-latest
            artifact: mako-aarch64-apple-darwin
          - os: windows-latest
            artifact: mako-x86_64-pc-windows-msvc
            is_windows: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y
        continue-on-error: true

      - name: Cargo build --release
        run: cargo build --release

      - name: Package Unix bundle
        if: runner.os != 'Windows'
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: ./scripts/package-release.sh --full "${{ matrix.artifact }}"

      - name: Package Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-release.ps1 -ArtifactName "${{ matrix.artifact }}"

      - name: Smoke install without Rust (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          PREFIX="${RUNNER_TEMP}/mako-prefix"
          ./scripts/install-release.sh \
            --base-url "file://${GITHUB_WORKSPACE}/dist" \
            --artifact "${{ matrix.artifact }}" \
            --prefix "$PREFIX" \
            --no-deps --no-shell --yes --skip-doctor
          export PATH="$PREFIX/bin:$PATH"
          export MAKO_RUNTIME="$PREFIX/share/mako/runtime"
          export MAKO_STD="$PREFIX/share/mako/std"
          mako --version
          mako doctor
          mako init "${RUNNER_TEMP}/hello" --name hello
          mako run "${RUNNER_TEMP}/hello/main.mko"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}*
            dist/install-release.sh
            dist/install-linux.sh

      - name: Release tag name
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish platform artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Mako ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.sha256
            dist/${{ matrix.artifact }}

      # Only Linux uploads installers so Windows CRLF checkout never overwrites them.
      - name: Publish install scripts (Linux only, LF)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            dist/install-release.sh
            dist/install-linux.sh
